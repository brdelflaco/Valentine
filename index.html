<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valentine</title>
  <style>
    :root{
      --bg1:#ffd6e0; --bg2:#ffb3c1; --yes:#ff4d6d; --text:#3a1b1f;
    }
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      font-family: Arial, sans-serif; color: var(--text); text-align:center; overflow-x:hidden;
    }
    .card{
      width:min(620px, 92vw); background: rgba(255,255,255,0.62);
      backdrop-filter: blur(6px); border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.14); padding: 20px;
      box-sizing: border-box;
    }
    h1{ font-size: 24px; margin: 0 0 10px; }
    p{ font-size: 15px; line-height: 1.4; margin: 5px 0; }
    
    #status {
      font-weight: bold; color: var(--yes); min-height: 1.5em; margin-top: 10px;
    }

    .playground{
      position: relative; width: 100%; height: 200px; /* Hauteur réduite pour mobile */
      margin-top: 15px; display: grid; place-items: center;
    }
    .btn-row{ display:flex; gap: 16px; position: relative; }
    button, .placeholder{ width: 120px; height: 50px; font-size: 18px; border: none; border-radius: 12px; }
    button{ cursor: pointer; box-shadow: 0 10px 18px rgba(0,0,0,0.1); background: #fff; }
    #yesBtn{ background: var(--yes); color: #fff; z-index: 10; }
    .placeholder{ display:inline-block; background: transparent; }
    #result{ display:none; animation: fadeIn 450ms ease; }
    video{ width:100%; max-width:400px; border-radius: 16px; margin-top: 15px; }
    @keyframes fadeIn{ from{ opacity:0; transform: translateY(6px); } to{ opacity:1; transform: translateY(0); } }
    .confetti{ position: fixed; top: -12px; pointer-events:none; animation: fall linear forwards; }
    @keyframes fall{ to{ transform: translateY(110vh) rotate(720deg); } }
  </style>
</head>
<body>

  <div class="card" id="questionCard">
    <h1>Invitation épistolaire</h1>
    
    <p><strong>Bravo, tu as été sélectionné pour passer un moment avec Romain samedi pro <br>
    Content ? (Clique sur le non) </strong></p>

    <p id="status"></p>

    <div class="playground" id="playground">
      <div class="btn-row" id="btnRow">
        <button id="yesBtn">Oui</button>
        <button id="noBtn">Non</button>
      </div>
    </div>
  </div>

  <div class="card" id="result">
    <h1>Bon choix ahah </h1>
    <p>A samedi -< :)</p>
    <video autoplay loop muted playsinline>
      <source src="fireworks.mp4" type="video/mp4" />
    </video>
  </div>

  <script>
    const playground = document.getElementById("playground");
    const btnRow = document.getElementById("btnRow");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const status = document.getElementById("status");
    const questionCard = document.getElementById("questionCard");
    const result = document.getElementById("result");

    let attempts = 0;
    let yesScale = 1;
    let lastMoveAt = 0;
    let cooldownMs = 260;

    function updateStatus() {
      const lines = [
        "", // Vide au début
        "Tu es libre de ton choix, mais réfléchis bien...",
        "Tu as vraiment essayé de cliquer sur Non ?",
        "Arrête, je vais me vexer",
        "C'est peine perdue",
        "Allez… abandonne et clique sur Oui"
      ];
      const idx = Math.min(lines.length - 1, Math.ceil(attempts / 2));
      status.textContent = lines[idx];
    }

    function armNoButton() {
      const ph = document.createElement("span");
      ph.className = "placeholder";
      btnRow.replaceChild(ph, noBtn);
      
      const pRect = playground.getBoundingClientRect();
      const phRect = ph.getBoundingClientRect();

      playground.appendChild(noBtn);
      noBtn.style.position = "absolute";
      noBtn.style.left = (phRect.left - pRect.left) + "px";
      noBtn.style.top = (phRect.top - pRect.top) + "px";
    }

    function moveNoRandom() {
      const rect = playground.getBoundingClientRect();
      const maxX = rect.width - noBtn.offsetWidth;
      const maxY = rect.height - noBtn.offsetHeight;
      noBtn.style.left = Math.random() * maxX + "px";
      noBtn.style.top = Math.random() * maxY + "px";
    }

    function escapeNo() {
      const now = performance.now();
      if (now - lastMoveAt < cooldownMs) return;
      lastMoveAt = now;

      attempts++;
      moveNoRandom();
      yesScale = Math.min(2.5, yesScale + 0.15);
      yesBtn.style.transform = `scale(${yesScale})`;
      updateStatus();
    }

    yesBtn.addEventListener("click", () => {
      questionCard.style.display = "none";
      result.style.display = "block";
    });

    noBtn.addEventListener("mouseenter", escapeNo);
    noBtn.addEventListener("touchstart", (e) => { e.preventDefault(); escapeNo(); });

    window.addEventListener("load", () => {
      setTimeout(armNoButton, 100);
    });
  </script>
</body>
</html>
